version: '3.8'

services:
  app:
    build: .
    container_name: springboot_app
    ports:
      - "8080:8080"
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres_db:5432/db_startup
      SPRING_DATASOURCE_USERNAME: user_java
      SPRING_DATASOURCE_PASSWORD: 1234
    depends_on:
      - postgres_db
    networks:
      - backend

  postgres_db:
    image: postgres:15
    container_name: postgres_db
    environment:
      POSTGRES_DB: db_startup
      POSTGRES_USER: user_java
      POSTGRES_PASSWORD: 1234
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - backend

networks:
  backend:


volumes:
  postgres_data:
