<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8">
  <title>Postulaciones</title>
  <link rel="stylesheet" th:href="@{/css/listar.css}">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
</head>
<body>
<header>
  <a th:href="@{/administrador}" style="text-decoration: none; color: inherit; display: inline-block;">
    <div style="display: flex; align-items: center; gap: 10px;">
      <img src="/images/logo.png" alt="Logo" style="width: 35px; height: 35px;">
      <strong>LEVIATAN'S STARTUPS</strong>
    </div>
  </a>

  <nav>
    <a th:href="@{/administrador}">Home</a>
    <a th:href="@{/admin/perfil}">Perfil</a>
    <a th:href="@{/sesion}">Sesiones</a>
    <a th:href="@{/administrador/convocatoria}">Convocatorias</a>
    <a th:href="@{/startup}">Startups</a>
    <a th:href="@{/postulacion}">Postulaciones</a>
  </nav>
  <a href="/logout" class="logout-btn">Cerrar Sesión</a>
</header>

<section class="banner-convocatoria">
  <h1>¡Bienvenido al apartado de Postulaciones!</h1>
  <a class="btn-crear" th:href="@{/crearPostulacion}">Crear Nueva</a>
</section>

<!-- Bloque para mostrar mensajes de éxito o error -->
<div th:if="${success}" class="alert alert-success" style="margin: 1rem; color: green; font-weight: bold;">
  <p th:text="${success}"></p>
</div>

<div th:if="${error}" class="alert alert-danger" style="margin: 1rem; color: red; font-weight: bold;">
  <p th:text="${error}"></p>
</div>

<section class="convocatorias">
  <h2>Postulaciones:</h2>
  <div class="panel-convocatoria">
    <div class="card-convocatoria" th:each="p : ${postulaciones}">

      <h3 th:text="${p.nombre}" class="titulo-sesion">Nombre</h3>

      <div class="info-sesion">
        <div class="info-item">
          <i class="fas fa-calendar-alt"></i>
          <div class="label">Fecha:</div>
          <div class="value" th:text="${#dates.format(p.fechaPostulacion, 'yyyy-MM-dd HH:mm')}"></div>
        </div>
        <div class="info-item">
          <i class="fas fa-envelope"></i>
          <div class="label">Email:</div>
          <div class="value" th:text="${p.email}"></div>
        </div>
        <div class="info-item">
          <i class="fas fa-comment"></i>
          <div class="label">Mensaje:</div>
          <div class="value" th:text="${p.mensaje}"></div>
        </div>
        <div class="info-item">
          <i class="fas fa-info-circle"></i>
          <div class="label">Estado:</div>
          <div class="value" th:text="${p.estado}"></div>
        </div>
        <div class="info-item">
          <i class="fas fa-building"></i>
          <div class="label">Startup:</div>
          <div class="value" th:text="${p.startup.nombre}"></div>
        </div>
        <div class="info-item">
          <i class="fas fa-bullhorn"></i>
          <div class="label">Convocatoria:</div>
          <div class="value" th:text="${p.convocatoria.titulo}"></div>
        </div>
      </div>

      <div th:if="${p.imagen != null}">
        <img th:src="${p.imagen}" alt="Imagen Postulacion" class="img-sesion"/>
      </div>

      <div class="botones-convocatoria">
        <a th:href="@{/editarPostulacion/{id}(id=${p.id})}">
          <button class="editar">Editar</button>
        </a>
        <form th:action="@{/eliminarPostulacion/{id}(id=${p.id})}" method="post">
          <button class="eliminar" type="submit"
                  onclick="return confirm('¿Estás seguro de eliminar esta postulación?');">
            Eliminar
          </button>
        </form>
      </div>
    </div>
  </div>
</section>
</body>
</html>
